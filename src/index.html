<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; script-src 'self'; connect-src 'self' https://vexcenter.xo.je https://vexcenter1.vercel.app">
  <title>VexCenter</title>
  <link rel="stylesheet" href="assets/css/variables.css" />
  <link rel="stylesheet" href="assets/css/main.css" />
</head>
<body>
  <div id="splash">
    <div class="splash-logo">
      <svg class="splash-svg" viewBox="0 0 80 80" fill="none">
        <defs>
          <linearGradient id="splash-grad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#7c3aed"/>
            <stop offset="100%" stop-color="#ec4899"/>
          </linearGradient>
        </defs>
        <rect x="4" y="4" width="72" height="72" rx="16" stroke="url(#splash-grad)" stroke-width="3" fill="none" class="splash-ring"/>
        <polygon points="32,22 54,40 32,58" fill="url(#splash-grad)" class="splash-triangle"/>
      </svg>
      <div class="splash-title">VexCenter</div>
      <div class="splash-sub">ładowanie...</div>
    </div>
  </div>
  <div id="app">
    <vc-header></vc-header>
    <div id="layout">
      <vc-sidebar></vc-sidebar>
      <main id="content">
        <div id="page-container"></div>
      </main>
    </div>
  </div>

  <script src="assets/js/utils/i18n.js"></script>
  <script src="assets/js/utils/router.js"></script>
  <script src="assets/js/utils/ui.js"></script>
  <script src="assets/js/api/config.js"></script>
  <script src="assets/js/api/api.js"></script>
  <script src="assets/js/components/header.js"></script>
  <script src="assets/js/components/sidebar.js"></script>
  <script src="assets/js/components/game-card.js"></script>
  <script src="assets/js/pages/store.js"></script>
  <script src="assets/js/pages/library.js"></script>
  <script src="assets/js/pages/profile.js"></script>
  <script src="assets/js/pages/auth.js"></script>
  <script src="assets/js/pages/settings.js"></script>
  <script src="assets/js/pages/admin.js"></script>
  <script src="assets/js/pages/game-detail.js"></script>
  <script src="assets/js/pages/user-profile.js"></script>
  <script src="assets/js/diagnostic.js"></script>
  <script src="assets/js/app.js"></script>
</body>
</html>
